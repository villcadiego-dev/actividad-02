<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link href="./styles.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <a href="./index.html">HOME</a> | <a href="./contacto.html">CONTACTO</a>
        </nav>
    </header>
    <main>
        <section class="section-contacto">
            <form class="contact-form" action="#" method="post">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="tu@email.com" required>

                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono"
                       pattern="[\+]?[\d\s\-\(\)]{8,}"
                       title="Ingresá un número válido (solo dígitos, espacios, guiones, paréntesis y +)"
                       placeholder="+54 11 1234 5678" required>

                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribí tu mensaje..." required></textarea>

                <div class="form-actions">
                    <button type="submit">Enviar</button>
                    <button type="reset">Cancelar</button>
                </div>
            </form>
        </section>
    </main>
    <footer>
        <p>Todos los derechos reservados - 2026 Diego Villca</p>
    </footer>
</body>
</html>
